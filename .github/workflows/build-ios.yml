name: Build iOS App

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build KONTRAK iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Verify Flutter setup
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create iOS platform files (if missing)
        run: |
          if [ ! -d "ios" ]; then
            echo "iOS folder not found. Creating iOS platform files..."
            flutter create --platforms=ios .
          else
            echo "iOS folder exists. Verifying structure..."
            ls -la ios/
          fi

      - name: Install CocoaPods dependencies
        run: |
          if [ ! -f "ios/Podfile" ]; then
            echo "Error: Podfile not found. iOS platform files may be incomplete."
            exit 1
          fi
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          echo "Building iOS app with environment variables..."
          echo "SUPABASE_URL: ${SUPABASE_URL:0:30}..."
          echo "API_BASE_URL: $API_BASE_URL"
          
          flutter build ios --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --no-codesign \
            --verbose

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r KONTRAK.ipa Payload
          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: kontrak-ios-ipa
          path: build/ios/ipa/KONTRAK.ipa
          retention-days: 30

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            build/ios/**/*.log
            ~/Library/Logs/CocoaPods/**/*.log
